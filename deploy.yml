apiVersion: apps/v1
kind: Deployment
metadata:
  name: valentine-app
  labels:
    app: valentine-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: valentine-app
  template:
    metadata:
      labels:
        app: valentine-app
    spec:
      containers:
      - name: valentine-app
        image: ghcr.io/sumit-patil-24/Valentine-Day-DevOps-Project:sha-9ef011ea9c9bf86e6fb4ea5a5c9c428843155d2e
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: valentine-ingress
spec:
  ingressClassName: "nginx"
  rules:
  - host: "valentine.example.com"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: valentine-app
            port:
              number: 80


