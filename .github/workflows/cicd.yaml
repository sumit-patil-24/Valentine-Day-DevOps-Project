name: CI/CD pipeline

on:
  push:
    branches: [main]
  paths-ignore: 
    - deploy.yml
  pull_request:
    branches: [main]

jobs:
  test:
    name: unit-testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

  lint:
    name: static code analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint
